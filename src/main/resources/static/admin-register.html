<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Register</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
background:linear-gradient(135deg,#1d4ed8,#2563eb,#3b82f6);
}

/* CARD */
.register-box{
width:430px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* LOGO */
.form-logo{
text-align:center;
font-size:34px;
font-weight:bold;
margin-bottom:10px;
color:#111;
}

.form-logo span{
color:#2563eb;
}

/* TITLE */
h2{
text-align:center;
font-size:28px;
margin-bottom:25px;
color:#111;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:14px;
}

.input-box i{
position:absolute;
top:15px;
left:14px;
color:#777;
font-size:14px;
}

input{
width:100%;
padding:13px 15px 13px 42px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
outline:none;
background:#fafafa;
}

input:focus{
border-color:#2563eb;
background:#fff;
box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* BUTTON */
button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#1d4ed8;
}

.bottom-link{
text-align:center;
margin-top:18px;
font-size:15px;
color:#555;
}

.bottom-link a{
color:#2563eb;
text-decoration:none;
font-weight:bold;
}

.bottom-link a:hover{
text-decoration:underline;
}

@media(max-width:768px){
.register-box{
width:100%;
}
}

</style>
</head>

<body>

<div class="register-box">

<div class="form-logo">Admin<span>Panel</span></div>

<h2>Register Admin</h2>

<form onsubmit="registerAdmin(); return false;">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="name" placeholder="Enter Full Name" required>
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Enter Email" required>
</div>

<div class="input-box">
<i class="fa fa-phone"></i>
<input type="text" id="phone" placeholder="Enter Phone Number" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Enter Password" required>
</div>

<button type="submit">Register Now</button>

</form>

<div class="bottom-link">
Already have account?
<a href="admin-login.html">Login</a>
</div>

</div>

<script>

function registerAdmin(){

let admin = {
name: document.getElementById("name").value.trim(),
email: document.getElementById("email").value.trim(),
phone: document.getElementById("phone").value.trim(),
password: document.getElementById("password").value.trim()
};

/* VALIDATION */
if(admin.name === "" || admin.email === "" || admin.phone === "" || admin.password === ""){

Swal.fire({
icon:'warning',
title:'Required',
text:'Please fill all fields',
confirmButtonColor:'#2563eb'
});

return;
}

/* CONFIRM ALERT */
Swal.fire({
title:'Are you sure?',
text:'Do you want to register admin?',
icon:'question',
showCancelButton:true,
confirmButtonColor:'#2563eb',
cancelButtonColor:'#d33',
confirmButtonText:'Yes, Register'
})
.then((result)=>{

if(result.isConfirmed){

fetch("http://localhost:8080/api/admin/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(admin)
})
.then(res => res.json())
.then(data => {

console.log(data);

/* SUCCESS */
if(data.code === 200 || data.code === 201){

Swal.fire({
icon:'success',
title:'Success',
text:data.message || 'Admin Registered Successfully',
confirmButtonColor:'#2563eb'
}).then(()=>{

document.querySelector("form").reset();

window.location.href="admin-login.html";

});

}else{

/* FAILED */
Swal.fire({
icon:'error',
title:'Failed',
text:data.message || 'Registration Failed',
confirmButtonColor:'#2563eb'
});

}

})
.catch(error => {

console.log(error);

Swal.fire({
icon:'error',
title:'Server Error',
text:'Something went wrong',
confirmButtonColor:'#2563eb'
});

});

}

});

}

</script>

</body>
</html>
