<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* SECTION */
.main-section{
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
background:linear-gradient(#71240178,#6112128c);
}

/* BOX */
.forgot-box{
width:420px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* LOGO */
.form-logo{
text-align:center;
font-size:34px;
font-weight:bold;
margin-bottom:10px;
color:#111;
}

.form-logo span{
color:#ff8800;
}

h2{
text-align:center;
font-size:28px;
margin-bottom:10px;
color:#111;
}

p{
text-align:center;
font-size:15px;
color:#666;
margin-bottom:25px;
line-height:22px;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:18px;
}

.input-box i{
position:absolute;
top:15px;
left:14px;
color:#777;
font-size:14px;
}

input{
width:100%;
padding:13px 15px 13px 42px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
outline:none;
background:#fafafa;
}

input:focus{
border-color:#ff8800;
background:#fff;
box-shadow:0 0 0 3px rgba(255,136,0,.15);
}

/* BUTTON */
button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#ff8800;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#e67600;
}

/* BACK */
.back-link{
text-align:center;
margin-top:18px;
font-size:15px;
}

.back-link a{
color:#ff8800;
text-decoration:none;
font-weight:bold;
}

.back-link a:hover{
text-decoration:underline;
}

@media(max-width:768px){
.forgot-box{
width:100%;
}
}

</style>
</head>

<body>

	<div id="header"></div>

			<script src="auth.js"></script>

			<script>
			fetch("header.html")
			.then(res => res.text())
			.then(html => {
			    document.getElementById("header").innerHTML = html;

			    // IMPORTANT: run auth logic AFTER header is loaded
			    loadAuthUI();
			});
			</script>
<section class="main-section">

<div class="forgot-box">

<div class="form-logo">Shop<span>Now</span></div>

<h2>Forgot Password</h2>

<p>Enter your registered email address.<br>We’ll help you reset your password.</p>

<form onsubmit="return false;">

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Enter Registered Email" required>
</div>

<button type="button" onclick="checkEmail()">Next</button>

<div id="passwordSection" style="display:none; margin-top:15px;">

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="oldPassword" placeholder="Enter Old Password" required>
</div>

<div class="input-box">
<i class="fa fa-key"></i>
<input type="password" id="newPassword" placeholder="Enter New Password" required>
</div>

<button type="button" onclick="changePassword()">Change Password</button>

</div>

</form>

<div class="back-link">
<a href="login.html">← Back to Login</a>
</div>

</div>

</section>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
function checkEmail(){

let email = document.getElementById("email").value.trim();

fetch("http://localhost:8080/api/users/getUser")
.then(response => response.json())
.then(data => {

let user = data.data.find(u => u.email === email);

if(user){

document.getElementById("passwordSection").style.display = "block";

Swal.fire({
icon:'success',
title:'Email Found',
text:'Now enter old & new password',
confirmButtonColor:'#ff8800'
});

}else{

Swal.fire({
icon:'error',
title:'Failed',
text:'Email not registered',
confirmButtonColor:'#d33'
});

}

})
.catch(error => {

Swal.fire({
icon:'error',
title:'Server Error',
text:'Unable to fetch user',
confirmButtonColor:'#d33'
});

console.log(error);

});

}

</script>



<script>
function changePassword(){

let user = {
email: document.getElementById("email").value.trim(),
oldPassword: document.getElementById("oldPassword").value.trim(),
newPassword: document.getElementById("newPassword").value.trim()
};

fetch("http://localhost:8080/api/users/change-password",{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(user)
})
.then(async response => {

let data = await response.json();

console.log("FULL RESPONSE =", data);

/* FINAL UNIVERSAL FIX */
if(
data.status == 200 ||
data.code == 200 ||
data.message == "Password Changed Successfully"
){

Swal.fire({
icon:'success',
title:'Successful',
text:'Password Changed Successfully',
confirmButtonColor:'#ff8800'
}).then(()=>{
window.location.href="login.html";
});

}else{

Swal.fire({
icon:'error',
title:'Failed',
text:data.message,
confirmButtonColor:'#d33'
});

}

})
.catch(error => {

Swal.fire({
icon:'error',
title:'Server Error',
text:'Something went wrong',
confirmButtonColor:'#d33'
});

console.log(error);

});

}
</script>
</body>
</html>
