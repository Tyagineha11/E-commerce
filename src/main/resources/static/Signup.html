<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Register</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* FORM SECTION */
.main-section{
min-height:calc(100vh - 180px);
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
background:linear-gradient(#71240178,#6112128c);
background-size:cover;
background-position:center;
}

.box{
width:430px;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.form-logo{
text-align:center;
font-size:34px;
font-weight:bold;
margin-bottom:10px;
color:#111;
}

.form-logo span{
color:#ff8800;
}

h2{
text-align:center;
font-size:28px;
margin-bottom:25px;
color:#111;
}

.input-box{
position:relative;
margin-bottom:14px;
}

.input-box i{
position:absolute;
top:15px;
left:14px;
color:#777;
font-size:14px;
}

input,select{
width:100%;
padding:13px 15px 13px 42px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
outline:none;
background:#fafafa;
}

input:focus,select:focus{
border-color:#ff8800;
background:white;
box-shadow:0 0 0 3px rgba(255,136,0,.15);
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#ff8800;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#e67600;
}

.login-link{
text-align:center;
margin-top:18px;
font-size:15px;
color:#555;
}

.login-link a{
color:#ff8800;
text-decoration:none;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}



@media(max-width:768px){
header{
padding:20px;
}

nav{
gap:15px;
margin-top:10px;
}

.box{
width:100%;
}
}
</style>
</head>

<body>

	<div id="header"></div>

		<script src="auth.js"></script>

		<script>
		fetch("header.html")
		.then(res => res.text())
		.then(html => {
		    document.getElementById("header").innerHTML = html;

		    // IMPORTANT: run auth logic AFTER header is loaded
		    loadAuthUI();
		});
		</script>

<section class="main-section">

<div class="box">

<div class="form-logo">Shop<span>Now</span></div>
<h2>Create Account</h2>

<form onsubmit="saveUser(); return false;">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="name" placeholder="Enter Name" required>
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Enter Email" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Enter Password (6 to 10 chars)" required>
</div>

<div class="input-box">
<i class="fa fa-phone"></i>
<input type="text" id="phone" placeholder="10 digit phone" required>
</div>

<div class="input-box">
<i class="fa fa-venus-mars"></i>
<select id="gender">
<option value="MALE">Male</option>
<option value="FEMALE">Female</option>
<option value="OTHER">Other</option>
</select>
</div>

<div class="input-box">
<i class="fa fa-calendar"></i>
<input type="date" id="dateOfBirth" required>
</div>

<button type="submit">Register</button>

<div class="login-link">
Already Registered?
<a href="login.html">Sign In</a>
</div>

</form>

</div>

</section>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
function saveUser(){

let user = {
name: document.getElementById("name").value.trim(),
email: document.getElementById("email").value.trim(),
password: document.getElementById("password").value.trim(),
phone: document.getElementById("phone").value.trim(),
gender: document.getElementById("gender").value,
dateOfBirth: document.getElementById("dateOfBirth").value
};

fetch("http://localhost:8080/api/users/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(user)
})
.then(res => res.json())
.then(data => {

/* ONLY MESSAGE CHECK */
if(data.message.includes("Successfully")){

Swal.fire({
icon:'success',
title:'Success',
text:data.message,
confirmButtonColor:'#ff8800'
}).then(()=>{
window.location.href="login.html";
});

document.querySelector("form").reset();

}else{

Swal.fire({
icon:'error',
title:'Failed',
text:data.message,
confirmButtonColor:'#d33'
});

}

})
.catch(error => {

Swal.fire({
icon:'error',
title:'Server Error',
text:'Something went wrong',
confirmButtonColor:'#d33'
});

console.log(error);

});

}
</script>

</body>
</html>
