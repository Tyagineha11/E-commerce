<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Forgot Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- SWEETALERT -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(#71240178,#6112128c);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */
.box{
width:420px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.logo span{color:#ff8800;}

h2{
text-align:center;
margin-bottom:8px;
}

p{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:20px;
}

.input-box{
position:relative;
margin-bottom:15px;
}

.input-box i{
position:absolute;
top:14px;
left:12px;
color:#888;
}

input{
width:100%;
padding:12px 12px 12px 40px;
border:1px solid #ddd;
border-radius:8px;
outline:none;
background:#fafafa;
}

input:focus{
border-color:#ff8800;
box-shadow:0 0 0 3px rgba(255,136,0,.2);
background:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff8800;
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#e67600;
}

.section{
display:none;
margin-top:15px;
padding-top:10px;
border-top:1px solid #eee;
}

.back{
text-align:center;
margin-top:15px;
font-size:14px;
}

.back a{
color:#ff8800;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">Shop<span>Now</span></div>

<h2>Forgot Password</h2>

<p>Enter seller email to reset password</p>

<!-- EMAIL -->
<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Seller Email">
</div>

<button onclick="checkEmail()">Verify Email</button>

<!-- PASSWORD SECTION -->
<div class="section" id="passwordSection">

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="oldPassword" placeholder="Old Password">
</div>

<div class="input-box">
<i class="fa fa-key"></i>
<input type="password" id="newPassword" placeholder="New Password">
</div>

<button onclick="changePassword()">Update Password</button>

</div>

<div class="back">
<a href="seller-login.html">← Back to Login</a>
</div>

</div>

<script>

let sellerEmail = null;

/* STEP 1 */
function checkEmail(){

    sellerEmail = document.getElementById("email").value.trim();

    if(!sellerEmail){
        Swal.fire({
            icon:"warning",
            title:"Email Required",
            text:"Please enter your email"
        });
        return;
    }

    document.getElementById("passwordSection").style.display = "block";

    Swal.fire({
        icon:"success",
        title:"Email Accepted",
        text:"Enter old and new password"
    });
}

/* STEP 2 */
function changePassword(){

    let oldPassword = document.getElementById("oldPassword").value.trim();
    let newPassword = document.getElementById("newPassword").value.trim();

    if(!sellerEmail){
        Swal.fire({
            icon:"warning",
            title:"Verify Email First"
        });
        return;
    }

    if(!oldPassword || !newPassword){
        Swal.fire({
            icon:"warning",
            title:"All fields are required"
        });
        return;
    }

    if(newPassword.length < 6){
        Swal.fire({
            icon:"warning",
            title:"Weak Password",
            text:"Password must be at least 6 characters"
        });
        return;
    }

    let payload = {
        email: sellerEmail,
        oldPassword: oldPassword,
        newPassword: newPassword
    };

    fetch("http://localhost:8080/api/sellers/change-password",{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {

        if(data.code === 200){

            Swal.fire({
                icon:"success",
                title:"Password Changed",
                text:data.message
            }).then(()=>{
                window.location.href="seller-login.html";
            });

        }else{

            Swal.fire({
                icon:"error",
                title:"Failed",
                text:data.message
            });

        }

    })
    .catch(err => {

        console.log(err);

        Swal.fire({
            icon:"error",
            title:"Server Error",
            text:"Something went wrong"
        });

    });
}

</script>

</body>
</html>
