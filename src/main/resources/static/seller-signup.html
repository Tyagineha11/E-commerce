<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Register</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

/* SECTION */
.main-section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
background:linear-gradient(#71240178,#6112128c);
}

/* BOX */
.signup-box{
width:500px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.form-logo{
text-align:center;
font-size:34px;
font-weight:bold;
margin-bottom:10px;
color:#111;
}

.form-logo span{
color:#ff8800;
}

h2{
text-align:center;
font-size:28px;
margin-bottom:10px;
color:#111;
}

p{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:25px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.full{
grid-column:1 / 3;
}

.input-box{
position:relative;
margin-bottom:14px;
}

.input-box i{
position:absolute;
top:15px;
left:14px;
color:#777;
font-size:14px;
}

input,textarea{
width:100%;
padding:13px 15px 13px 42px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
outline:none;
background:#fafafa;
resize:none;
}

input:focus,
textarea:focus{
border-color:#ff8800;
background:#fff;
box-shadow:0 0 0 3px rgba(255,136,0,.15);
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#ff8800;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#e67600;
}

.login-link{
text-align:center;
margin-top:18px;
font-size:15px;
color:#555;
}

.login-link a{
color:#ff8800;
text-decoration:none;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}

@media(max-width:768px){

.signup-box{
width:100%;
}

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

}
</style>
</head>

<body>

<section class="main-section">

<div class="signup-box">

<div class="form-logo">Shop<span>Now</span></div>

<h2>Seller Registration</h2>

<p>Create your seller account and start selling</p>

<form onsubmit="registerSeller(); return false;">

<div class="form-grid">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="ownerName" placeholder="Owner Name" required>
</div>

<div class="input-box">
<i class="fa fa-store"></i>
<input type="text" id="shopName" placeholder="Shop Name" required>
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<i class="fa fa-phone"></i>
<input type="text" id="phone" placeholder="Phone Number" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
</div>

<div class="input-box">
<i class="fa fa-location-dot"></i>
<input type="text" id="pincode" placeholder="Pincode" required>
</div>

<div class="input-box full">
<i class="fa fa-map-marker-alt"></i>
<textarea rows="3" id="address" placeholder="Full Address" required></textarea>
</div>

<div class="input-box full">
<button type="submit">Register Seller</button>
</div>

</div>

</form>

<div class="login-link">
Already have account?
<a href="seller-login.html">Login</a>
</div>

</div>

</section>

<script>
function registerSeller(){

let seller = {
ownerName: document.getElementById("ownerName").value.trim(),
shopName: document.getElementById("shopName").value.trim(),
email: document.getElementById("email").value.trim(),
phone: document.getElementById("phone").value.trim(),
password: document.getElementById("password").value.trim(),
pincode: document.getElementById("pincode").value.trim(),
address: document.getElementById("address").value.trim()
};

fetch("http://localhost:8080/api/sellers/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(seller)
})
.then(res => res.json())
.then(data => {

if(data.code == 200){

Swal.fire({
icon:'success',
title:'Success',
text:data.message,
confirmButtonColor:'#ff8800'
}).then(()=>{
window.location.href="seller-login.html";
});

document.querySelector("form").reset();

}else{

Swal.fire({
icon:'error',
title:'Failed',
text:data.message,
confirmButtonColor:'#d33'
});

}

})
.catch(error => {

console.log(error);

Swal.fire({
icon:'error',
title:'Server Error',
text:'Something went wrong',
confirmButtonColor:'#d33'
});

});

}
</script>

</body>
</html>
