<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>

body{
	display: block !important;
}

/* LAYOUT */
.container{
display:flex;
min-height:100vh;
}

/* SIDEBAR */
#sidebar{
width:240px;
background:#111827;
color:#fff;
}

/* MAIN */
.main{
flex:1;
}


/* CENTER */
.center{
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

/* CARD */
.forgot-box{
width:420px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.form-logo{
text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.form-logo span{color:#ff8800;}

h2{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:20px;
}

.input-box{
position:relative;
margin-bottom:15px;
}

.input-box i{
position:absolute;
top:14px;
left:12px;
color:#777;
}

input{
width:100%;
padding:12px 12px 12px 40px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
outline:none;
}

input:focus{
border-color:#ff8800;
box-shadow:0 0 0 3px rgba(255,136,0,.15);
background:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff8800;
color:#fff;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#e67600;
}

.section{
display:none;
margin-top:15px;
padding-top:10px;
border-top:1px solid #eee;
}

.back-link{
text-align:center;
margin-top:15px;
}

.back-link a{
color:#ff8800;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div id="header"></div>

<!-- CONTENT -->
<div class="center">

<div class="forgot-box">

<div class="form-logo">Shop<span>Now</span></div>

<h2>Forgot Password</h2>

<p>Enter seller email</p>

<!-- EMAIL -->
<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Seller Email">
</div>

<button onclick="checkEmail()">Next</button>

<!-- PASSWORD -->
<div class="section" id="passwordSection">

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="oldPassword" placeholder="Old Password">
</div>

<div class="input-box">
<i class="fa fa-key"></i>
<input type="password" id="newPassword" placeholder="New Password">
</div>

<button onclick="changePassword()">Change Password</button>

</div>

<div class="back-link">
<a href="seller-dashboard.html">← Back to Dashboard</a>
</div>

</div>

</div>

</div>

</div>

<script>

/* LOAD COMPONENTS */
fetch("seller-sidebar.html")
.then(r=>r.text())
.then(d=>document.getElementById("sidebar").innerHTML=d);

fetch("seller-header.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("header").innerHTML=d;
watchHeader();
});

/* WAIT HEADER INIT */
function watchHeader(){
const interval=setInterval(()=>{
if(document.getElementById("profileBtn")){
initSellerHeader();
clearInterval(interval);
}
},100);
}

/* HEADER INIT */
function initSellerHeader(){

const btn=document.getElementById("profileBtn");
const dropdown=document.getElementById("profileDropdown");

if(!btn||!dropdown)return;

btn.onclick=(e)=>{
e.stopPropagation();
dropdown.classList.toggle("show");
};

document.addEventListener("click",(e)=>{
if(!e.target.closest(".profile-menu")){
dropdown.classList.remove("show");
}
});
}

/* EMAIL CHECK (SELLER API FIX) */
function checkEmail(){

let email=document.getElementById("email").value.trim();

if(!email){
Swal.fire("Error","Enter email first","error");
return;
}

let sellerToken = localStorage.getItem("sellerToken");

if(!sellerToken){
    window.location.href = "seller-login.html";
}

function authHeader(extra = {}) {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sellerToken,
        ...extra
    };
}

/* SELLER API */
fetch(
    "http://localhost:8080/api/sellers/getAll",
    {
        method: "GET",
        headers: authHeader()
    }
)
.then(res=>res.json())
.then(data=>{

let seller=data.data.find(s=>s.email===email);

if(seller){

document.getElementById("passwordSection").style.display="block";

Swal.fire({
icon:"success",
title:"Email Found",
text:"Enter old & new password"
});

}else{

Swal.fire("Error","Seller not found","error");

}

});

}

/* CHANGE PASSWORD */
function changePassword(){

let payload={
email:document.getElementById("email").value,
oldPassword:document.getElementById("oldPassword").value,
newPassword:document.getElementById("newPassword").value
};

fetch(
    "http://localhost:8080/api/sellers/change-password",
    {
        method:"PUT",
        headers: authHeader(),
        body: JSON.stringify(payload)
    }
)
.then(res=>res.json())
.then(data=>{

if(data.code===200){

Swal.fire({
icon:"success",
title:"Password Updated"
}).then(()=>{
window.location.href="seller-login.html";
});

}else{

Swal.fire("Error",data.message,"error");

}

});

}

</script>

</body>
</html>
