
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShopNow</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

/* HERO */

.hero{
height:500px;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1400&q=80');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

text-align:center;
color:white;
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
font-size:24px;
}

/* PRODUCTS */

.products{
padding:60px 50px;
text-align:center;
}

.filter-buttons button{
padding:10px 20px;
margin:6px;
border:1px solid #ddd;
background:white;
border-radius:6px;
cursor:pointer;
}

.filter-buttons button.active{
background:#ff8800;
color:white;
border:none;
}

.product-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
}

@media(max-width:1200px){
.product-container{
grid-template-columns:repeat(4,1fr);
}
}

@media(max-width:992px){
.product-container{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:768px){
.product-container{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.product-container{
grid-template-columns:1fr;
}
}

/* CARD */

.card{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
position:relative;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0 5px;
font-size:18px;
line-height:1.4;

display:-webkit-box;
-webkit-line-clamp:1;
-webkit-box-orient:vertical;

overflow:hidden;
}

.card p{
color:green;
font-weight:bold;
}

/* BUTTONS */

.btn-group{
display:flex;
gap:8px;
margin-top:10px;
align-items:center;
}

.view-btn,
.cart-btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
font-size:14px;
}

.view-btn{
background:#3b82f6;
}

.cart-btn{
background:#10b981;
}

/* QUANTITY */

.qty-box{
display:flex;
align-items:center;
justify-content:space-between;
background:#10b981;
border-radius:8px;
padding:5px 8px;
width:120px;
height:42px;
}

.qty-box button{
width:30px;
height:30px;
border:none;
border-radius:6px;
background:white;
color:#111827;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.qty-box span{
color:white;
font-size:16px;
font-weight:bold;
}

/* WISHLIST */

.wishlist{
position:absolute;
top:10px;
right:10px;
background:white;
width:32px;
height:32px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;
}

.wishlist i{
color:#ff3b5c;
}

/* OUT OF STOCK */

.image-wrapper{
position:relative;
width:100%;
}

.out-stock-img{
filter:blur(3px) brightness(0.6);
}

.stock-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:200px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.35);
color:white;
font-size:24px;
font-weight:bold;
border-radius:10px;
letter-spacing:1px;
}

</style>

</head>

<body>

<div id="header"></div>

<script>
	fetch("header.html")
	.then(res => res.text())
	.then(html => {
	document.getElementById("header").innerHTML = html;
	// IMPORTANT: run auth logic AFTER header is loaded
	 loadAuthUI();
	});
</script>

<section class="hero">

<div>
<h1>Big Sale is Live</h1>
<p>Up to 70% Off</p>
</div>

</section>

<section class="products">

<h2>Products</h2>

<div
class="filter-buttons"
id="categoryButtons">
</div>

<div
class="product-container"
id="productContainer">
</div>

</section>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>
<script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>


<script src="security.js"></script>
<script src="auth.js"></script>


<script>

	let userId = localStorage.getItem("userId");

	let wishlistSet = new Set();
	let cartMap = new Map();

	let allProducts = [];
	let productCache = [];

	init();

	async function init() {

	    await loadProducts();
	    await loadCategories();

	    // sirf login user ke liye
	    if (userId && localStorage.getItem("accessToken")) {

	        await loadWishlist();
	        await loadCart();
	    }

	    render();
	}

/* =========================
PRODUCTS
========================= */

async function loadProducts() {

    try {

        const response = await fetchWithAuth(
            "http://localhost:8080/api/products/getAll"
        );

        const result = await response.json();

        allProducts = result.data || [];
        productCache = [...allProducts];

    } catch (e) {
        console.log(e);
    }
}

/* =========================
CATEGORIES
========================= */

async function loadCategories() {

    try {

        const response = await fetchWithAuth(
            "http://localhost:8080/api/categories/getAll"
        );

        const result = await response.json();

        let html = `
        <button class="active"
                onclick="resetProducts(this)">
            All
        </button>
        `;

        (result.data || []).forEach(cat => {

            html += `
            <button
                onclick="loadByCategory(${cat.id},this)">
                ${cat.name}
            </button>
            `;
        });

        document.getElementById(
            "categoryButtons"
        ).innerHTML = html;

    } catch (e) {
        console.log(e);
    }
}

function resetProducts(btn) {

    setActive(btn);

    productCache = [...allProducts];

    render();
}

async function loadByCategory(id, btn) {

    setActive(btn);

    try {

        const response = await fetchWithAuth(
            `http://localhost:8080/api/products/category/${id}`
        );

        const result = await response.json();

        productCache = result.data || [];

        render();

    } catch (e) {
        console.log(e);
    }
}

function setActive(btn) {

    document
        .querySelectorAll(".filter-buttons button")
        .forEach(b =>
            b.classList.remove("active")
        );

    btn.classList.add("active");
}

/* =========================
WISHLIST
========================= */

async function loadWishlist() {

    try {

        const response = await fetchWithAuth(
            "http://localhost:8080/api/wishlist/get",
            {
                headers: {
                    userId: userId
                }
            }
        );

        const result = await response.json();

        wishlistSet.clear();

        (result.data || []).forEach(item => {
            wishlistSet.add(item.productId);
        });

    } catch (e) {
        console.log(e);
    }
}

/* =========================
CART
========================= */

async function loadCart() {

    try {

        const response = await fetchWithAuth(
            `http://localhost:8080/api/cart-items?userId=${userId}`
        );

        const result = await response.json();

        cartMap.clear();

        (result.data?.items || []).forEach(item => {

            cartMap.set(
                item.productId,
                item.quantity
            );
        });

    } catch (e) {
        console.log(e);
    }
}

/* =========================
VIEW PRODUCT
========================= */

function viewProduct(id) {

    window.location.href =
        `product-detail.html?id=${id}`;
}

/* =========================
RENDER
========================= */

function render() {

    let html = "";

    productCache.forEach(product => {

        let qty =
            cartMap.get(product.id);

        let isWish =
            wishlistSet.has(product.id);

        let image =
            product.imageBase64
            ? `data:image/jpeg;base64,${product.imageBase64}`
            : "https://via.placeholder.com/300";

        html += `
        <div class="card">

			<div class="wishlist"
			     onclick="toggleWishlist(${product.id})">
			    <i class="fa-${isWish ? "solid" : "regular"} fa-heart"></i>
			</div>

            <img src="${image}">

            <h3>${product.name}</h3>

            <p>
                ₹${product.discountPrice || product.price}
            </p>

            <div class="btn-group">

                <button
                    class="view-btn"
                    onclick="viewProduct(${product.id})">
                    View
                </button>

                ${
                    qty
                    ?
                    `<div class="qty-box">
					    <button onclick="changeQty(${product.id},${qty-1})">-</button>
					    <span>${qty}</span>
					    <button onclick="changeQty(${product.id},${qty+1})">+</button>
					</div>`
                    :
                    `<button
					    class="cart-btn"
					    onclick="addToCart(${product.id})">
					    Add
					</button>`
                }

            </div>

        </div>
        `;
    });

    document.getElementById(
        "productContainer"
    ).innerHTML = html;
}

async function toggleWishlist(productId){

    if(!localStorage.getItem("accessToken")){
        window.location.href = "login.html";
        return;
    }

    try{

        if(wishlistSet.has(productId)){

            await fetchWithAuth(
                `http://localhost:8080/api/wishlist/delete/${productId}`,
                {
                    method:"DELETE",
                    headers:{
                        userId:userId
                    }
                }
            );

            wishlistSet.delete(productId);

        }else{

            await fetchWithAuth(
                `http://localhost:8080/api/wishlist/add/${productId}`,
                {
                    method:"POST",
                    headers:{
                        userId:userId
                    }
                }
            );

            wishlistSet.add(productId);
        }

        render();

    }catch(e){
        console.log(e);
    }
}

async function addToCart(productId){

    if(!localStorage.getItem("accessToken")){
        window.location.href = "login.html";
        return;
    }

    try{

        await fetchWithAuth(
            "http://localhost:8080/api/cart/add",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    userId:Number(userId),
                    productId:productId,
                    quantity:1
                })
            }
        );

        cartMap.set(productId,1);

        render();

    }catch(e){
        console.log(e);
    }
}

async function changeQty(productId,qty){

    if(!localStorage.getItem("accessToken")){
        window.location.href = "login.html";
        return;
    }

    try{

        if(qty <= 0){

            await fetchWithAuth(
                `http://localhost:8080/api/cart/remove/${productId}?userId=${userId}`,
                {
                    method:"DELETE"
                }
            );

            cartMap.delete(productId);

        }else{

            await fetchWithAuth(
                "http://localhost:8080/api/cart/update",
                {
                    method:"PUT",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        userId:Number(userId),
                        productId:productId,
                        quantity:qty
                    })
                }
            );

            cartMap.set(productId,qty);
        }

        render();

    }catch(e){
        console.log(e);
    }
}

</script>

</body>

</html>
