<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Details</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f6f9;
}

.container{
display:flex;
min-height:100vh;
}

.main{
flex:1;
}

.content{
padding:40px;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:100%;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.box h2{
text-align:center;
margin-bottom:20px;
color:#111827;
}

label{
font-weight:600;
display:block;
margin-top:12px;
color:#333;
font-size:14px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ddd;
border-radius:8px;
background:#f9f9f9;
outline:none;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div class="main">

<div id="adminHeader"></div>

<div class="content">

<div class="box">

<h2>Seller Information</h2>

<label>Owner Name</label>
<input type="text" id="ownerName" readonly>

<label>Shop Name</label>
<input type="text" id="shopName" readonly>

<label>Email</label>
<input type="text" id="email" readonly>

<label>Phone</label>
<input type="text" id="phone" readonly>

<label>Address</label>
<input type="text" id="address" readonly>

<label>Pincode</label>
<input type="text" id="pincode" readonly>

<label>Verified</label>
<input type="text" id="verified" readonly>

</div>

</div>

</div>

</div>


<script src="admin-common.js"></script>
<script src="security.js"></script>

<script>

	/* =========================
	   AUTH CHECK
	========================= */
	const token = localStorage.getItem("accessToken");
	const role = localStorage.getItem("role");

	if (!token || role !== "ADMIN") {
	    window.location.href = "admin-login.html";
	}

	/* =========================
	   LOAD UI
	========================= */
	fetch("admin-sidebar.html")
	.then(r => r.text())
	.then(d => document.getElementById("sidebar").innerHTML = d);

	fetch("admin-header.html")
	.then(r => r.text())
	.then(d => document.getElementById("adminHeader").innerHTML = d);

	/* =========================
	   GET ID
	========================= */
	const id = new URLSearchParams(location.search).get("id");

	if (!id) {
	    alert("Seller ID missing");
	    location.href = "admin-dashboard.html";
	}

	/* =========================
	   FETCH SELLER (FIXED API)
	========================= */
	async function loadSeller() {
	    try {

	        const res = await fetch(
	            `http://localhost:8080/api/admin/sellers`,
	            {
	                headers: {
	                    "Authorization": "Bearer " + token
	                }
	            }
	        );

	        if (res.status === 401) {
	            localStorage.clear();
	            location.href = "admin-login.html";
	            return;
	        }

	        const data = await res.json();
	        const sellers = data?.data || [];

	        // 🔥 IMPORTANT FIX: filter manually
	        const seller = sellers.find(s => s.id === id);

	        if (!seller) {
	            alert("Seller not found (check ID or backend data)");
	            return;
	        }

	        document.getElementById("ownerName").value = seller.ownerName || "";
	        document.getElementById("shopName").value = seller.shopName || "";
	        document.getElementById("email").value = seller.email || "";
	        document.getElementById("phone").value = seller.phone || "";
	        document.getElementById("address").value = seller.address || "";
	        document.getElementById("pincode").value = seller.pincode || "";
	        document.getElementById("verified").value = seller.isVerified ? "Yes" : "No";

	    } catch (err) {
	        console.log(err);
	        alert("Server error while loading seller");
	    }
	}

	loadSeller();
	</script>

</body>
</html>
