<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

/* LOGIN SECTION */
.main-section{
min-height:calc(100vh - 180px);
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
background:linear-gradient(#71240178,#6112128c);
background-size:cover;
background-position:center;
}

.login-box{
width:420px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.form-logo{
text-align:center;
font-size:34px;
font-weight:bold;
margin-bottom:10px;
color:#111;
}

.form-logo span{
color:#ff8800;
}

h2{
text-align:center;
font-size:28px;
margin-bottom:25px;
color:#111;
}

.input-box{
position:relative;
margin-bottom:14px;
}

.input-box i{
position:absolute;
top:15px;
left:14px;
color:#777;
font-size:14px;
}

input{
width:100%;
padding:13px 15px 13px 42px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
outline:none;
background:#fafafa;
}

input:focus{
border-color:#ff8800;
background:#fff;
box-shadow:0 0 0 3px rgba(255,136,0,.15);
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#ff8800;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#e67600;
}

.signup-link{
text-align:center;
margin-top:18px;
font-size:15px;
color:#555;
}

.signup-link a{
color:#ff8800;
text-decoration:none;
font-weight:bold;
}

.signup-link a:hover{
text-decoration:underline;
}
/* REMEMBER + FORGOT ROW */
.extra-options{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0 18px;
font-size:14px;
}

.remember-box{
display:flex;
align-items:center;
gap:8px;
color:#555;
cursor:pointer;
}

.remember-box input{
width:auto;
margin:0;
accent-color:#ff8800;
cursor:pointer;
}

.remember-box span{
font-size:14px;
}

.forgot-link{
text-decoration:none;
color:rgb(0, 0, 255);
font-weight:600;
transition:0.3s;
}

.forgot-link:hover{
text-decoration:underline;
color:rgb(0, 0, 128);
}

/* MOBILE */
@media(max-width:480px){

.extra-options{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

}



@media(max-width:768px){
header{
padding:20px;
}

nav{
gap:15px;
margin-top:10px;
}

.login-box{
width:100%;
}
}
</style>
</head>

<body>
<div id="header"></div>

<script src="auth.js"></script>
<script src="security.js"></script>

<script>
	fetch("header.html")
	.then(res => res.text())
	.then(html => {
	document.getElementById("header").innerHTML = html;
	// IMPORTANT: run auth logic AFTER header is loaded
	 loadAuthUI();
	});
</script>

<section class="main-section">

<div class="login-box">

<div class="form-logo">Shop<span>Now</span></div>
<h2>User Login</h2>

<form onsubmit="loginUser(); return false;">

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Enter Email" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Enter Password" required>
</div>

<button type="submit">Login</button>

</form>

<!-- NEW ROW -->
<div class="extra-options">

<label class="remember-box">
<input type="checkbox" id="rememberMe">
<span>Remember Me</span>
</label>

<a href="forgot-password.html" class="forgot-link">Forgot Password?</a>

</div>

<div class="signup-link">
Don't have an account?
<a href="signup.html">Register</a>
</div>

</div>

</section>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<script>

async function loginUser() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        const response = await fetch("/api/users/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const result = await response.json();

        if (result.code === 200) {

            // USER DATA SAVE
            localStorage.setItem(
                "loggedInUser",
                JSON.stringify(result.data.user)
            );

            localStorage.setItem(
                "userId",
                result.data.user.id
            );

            // ROLE SAVE
            localStorage.setItem(
                "role",
                "USER"
            );

            // JWT TOKENS SAVE
            localStorage.setItem(
                "accessToken",
                result.data.accessToken
            );

            localStorage.setItem(
                "refreshToken",
                result.data.refreshToken
            );

            Swal.fire({
                icon: "success",
                title: "Login Successful"
            }).then(() => {

                window.location.href = "index.html";

            });

        } else {

            Swal.fire({
                icon: "error",
                title: result.message
            });

        }

    } catch (error) {

        console.log(error);

        Swal.fire({
            icon: "error",
            title: "Server Error"
        });

    }
}

</script>
</body>
</html>
